name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug - list all files
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== Files in tests ==="
          ls -la tests/
          echo "=== Check if taskmanager.py exists ==="
          if [ -f taskmanager.py ]; then
            echo "taskmanager.py EXISTS"
            head -10 taskmanager.py
          else
            echo "taskmanager.py DOES NOT EXIST"
          fi

      - run: |
          python -m pip install --upgrade pip
          pip install pytest

      - run: pytest -q